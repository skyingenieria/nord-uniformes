<!DOCTYPE html>
<html lang="es">
<head>

        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedido confirmado — NORD Uniformes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;600;700;800;900&family=Cormorant+Garamond:ital,wght@1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --azul:#1E2D4A;--azul-900:#0F172E;--azul-400:#6B7B9C;
      --dorado:#C8A96E;--dorado-300:#E0CBA0;
      --niebla-200:#D3DAE5;--crema:#F4F1EA;--crema-2:#ECE7DC;--blanco:#FFFFFF;
      --sans:"Mulish",system-ui,sans-serif;--serif:"Cormorant Garamond",serif;
      --pad-x:clamp(20px,5vw,80px);--max:720px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--sans);background:var(--crema);color:var(--azul-900);-webkit-font-smoothing:antialiased}
    a{text-decoration:none}

    header{background:rgba(244,241,234,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(30,45,74,.08);position:sticky;top:0;z-index:100}
    .header-container{max-width:1200px;margin:0 auto;padding:0 var(--pad-x);height:64px;display:flex;justify-content:space-between;align-items:center}
    .brand-logo .nord{font-weight:900;font-size:22px;letter-spacing:.06em;display:block;color:var(--azul-900)}
    .brand-logo .uniformes{font-weight:300;font-size:6px;letter-spacing:.55em;display:block;margin-top:2px;padding-left:.55em;color:var(--azul-900)}

    .page{max-width:var(--max);margin:0 auto;padding:60px var(--pad-x) 80px;text-align:center}

    .check-icon{
      width:72px;height:72px;background:var(--azul-900);border-radius:50%;
      display:flex;align-items:center;justify-content:center;margin:0 auto 24px;
    }

    .page h1{font-size:clamp(28px,5vw,40px);font-weight:900;letter-spacing:-.02em;margin-bottom:12px}
    .page .subtitle{font-family:var(--serif);font-style:italic;font-size:18px;color:var(--azul-400);margin-bottom:40px}

    .order-id-box{
      display:inline-block;background:var(--azul-900);color:var(--dorado-300);
      font-size:13px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;
      padding:10px 24px;margin-bottom:40px;
    }

    .summary-card{background:var(--blanco);border:1px solid var(--niebla-200);padding:28px;text-align:left;margin-bottom:32px;border-radius:14px;box-shadow:0 2px 12px rgba(30,45,74,.06)}
    .summary-card-title{font-size:11px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--azul-400);margin-bottom:18px}
    .sum-row{display:flex;justify-content:space-between;font-size:14px;padding:7px 0;border-bottom:1px solid var(--niebla-200);color:var(--azul-400)}
    .sum-row:last-child{border-bottom:none}
    .sum-row span:last-child{font-weight:700;color:var(--azul-900)}
    .sum-total{display:flex;justify-content:space-between;font-size:20px;font-weight:800;padding-top:16px;margin-top:8px;border-top:1px solid var(--niebla-200)}

    .items-list{margin:16px 0 0;display:flex;flex-direction:column;gap:8px}
    .item-row{display:flex;justify-content:space-between;font-size:13px;color:var(--azul-900)}
    .item-sub{font-size:11px;color:var(--azul-400);margin-top:1px}

    .info-box{background:var(--crema-2);border-left:3px solid var(--dorado);padding:16px 18px;text-align:left;margin-bottom:32px;font-size:13px;color:var(--azul-400);line-height:1.7;border-radius:10px}
    .info-box strong{color:var(--azul-900)}

    .btn-wp{display:inline-flex;align-items:center;justify-content:center;gap:10px;background:#25D366;color:#fff;border:none;padding:15px 32px;font-family:var(--sans);font-size:12px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;transition:background .2s, box-shadow .2s;text-decoration:none;margin-bottom:16px;width:100%;border-radius:10px;box-shadow:0 4px 12px rgba(37,211,102,.2)}
    .btn-wp:hover{background:#1ebe5d;box-shadow:0 6px 16px rgba(37,211,102,.3)}
    .btn-seguir{display:block;font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--azul-400);margin-top:8px;transition:color .15s}
    .btn-seguir:hover{color:var(--azul-900)}
  </style>
</head>
<body>
<header>
  <div class="header-container">
    <a href="/" class="brand-logo">
      <span class="nord">NORD</span>
      <span class="uniformes">UNIFORMES</span>
    </a>
  </div>
</header>

<div class="page">
  <div class="check-icon">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#C8A96E" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
  </div>

  <h1>¡Muchas gracias por tu compra!</h1>
  <p class="subtitle">Nos estaremos contactando para coordinar el retiro de tu pedido.</p>

  <div class="order-id-box" id="order-id">Pedido #...</div>

  <div class="summary-card" id="summary-card">
    <p class="summary-card-title">Resumen del pedido</p>
    <div id="items-list" class="items-list"></div>
    <div id="sum-rows" style="margin-top:16px"></div>
  </div>

  <div class="info-box" id="info-box"></div>

  <a class="btn-wp" id="btn-wp" href="#" target="_blank" rel="noopener">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    Contactar por WhatsApp
  </a>
  <a class="btn-seguir" href="/wellspring">← Seguir comprando</a>
</div>

<script>
const WHATSAPP = "5491122913796";
function fmt(n) { return "$" + Math.round(Number(n)).toLocaleString("es-AR"); }

const data = JSON.parse(sessionStorage.getItem("nord_last_order") || "null");

if (!data) {
  document.getElementById("order-id").textContent = "Sin datos de orden";
} else {
  document.getElementById("order-id").textContent = "Pedido #" + data.idPedido;

  // Items
  const itemsEl = document.getElementById("items-list");
  (data.items || []).forEach(i => {
    itemsEl.innerHTML += `<div class="item-row">
      <div><div>${i.nombre}</div><div class="item-sub">Talle ${i.talle} × ${i.qty}</div></div>
      <div>${fmt(i.precio * i.qty)}</div>
    </div>`;
  });

  // Totales
  const sumEl = document.getElementById("sum-rows");
  let html = `<div class="sum-row"><span>Subtotal</span><span>${fmt(data.subtotal)}</span></div>`;
  if (data.descuento > 0)
    html += `<div class="sum-row"><span>Descuento (${data.pago === "transferencia" ? "Transferencia" : "Nave"})</span><span style="color:#2e7d52">- ${fmt(data.descuento)}</span></div>`;
  html += `<div class="sum-row"><span>Envío</span><span>Gratis (Retiro)</span></div>`;
  html += `<div class="sum-total"><span>Total</span><span>${fmt(data.total)}</span></div>`;
  sumEl.innerHTML = html;

  // Info box
  const info = document.getElementById("info-box");
  info.innerHTML = `<strong>✓ Pago recibido:</strong> tu pedido #<strong>${data.idPedido}</strong> ha sido confirmado. Te contactaremos en breve para coordinar el retiro en Barrio Habitat, Pilar.`;

  // WA link
  const msg = encodeURIComponent(`Hola! Quiero consultar sobre mi pedido #${data.idPedido}. Gracias`);
  document.getElementById("btn-wp").href = `https://wa.me/${WHATSAPP}?text=${msg}`;

  // Limpiar carrito
  localStorage.removeItem("nord_cart");
}
</script>
</body>
</html>
