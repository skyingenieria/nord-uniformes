<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NORD Uniformes — Uniformes Escolares y Ropa de Trabajo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,300;0,400;0,600;0,700;0,800;0,900&family=Cormorant+Garamond:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul:#1E2D4A;--azul-900:#0F172E;--dorado:#C8A96E;--dorado-700:#A6884B;--dorado-300:#E0CBA0;
            --crema:#F4F1EA;--sans:"Mulish",system-ui,sans-serif;--serif:"Cormorant Garamond",serif;
            --pad-x:clamp(24px,6vw,100px);
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html,body{height:100%;margin:0}
        body{font-family:var(--sans);background:var(--azul-900);color:#fff;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}
        footer{background:rgba(0,0,0,.3);padding:24px var(--pad-x);font-size:12px;color:rgba(255,255,255,.45);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
        footer a{color:rgba(255,255,255,.6);text-decoration:none;}
        footer a:hover{color:white}
        footer strong{color:rgba(255,255,255,.8);font-size:10px;letter-spacing:.16em;text-transform:uppercase}
        a{text-decoration:none}

        .hero {
            flex: 1;
            background: linear-gradient(135deg, var(--azul-900) 0%, #152031 60%, #0a1520 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: var(--pad-x);
            position: relative;
            overflow: hidden;
        }

        /* Glow dorado sutil */
        .hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 900px 500px at 30% 40%, rgba(200,169,110,.06), transparent 60%),
                radial-gradient(ellipse 600px 400px at 70% 65%, rgba(30,45,74,.4), transparent 55%);
            pointer-events: none;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 860px;
        }

        /* WhatsApp flotante */
        .wa-float {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
        }
        .wa-card {
            background: white;
            border-radius: 12px;
            padding: 14px 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
            font-family: var(--sans);
            font-size: 13px;
            color: var(--azul-900);
            line-height: 1.6;
            display: none;
            max-width: 240px;
        }
        .wa-card.visible { display: block; }
        .wa-card strong { display: block; font-size: 12px; font-weight: 800; letter-spacing: .06em; margin-bottom: 6px; text-transform: uppercase; }
        .wa-card a { color: var(--azul); text-decoration: none; font-weight: 600; }
        .wa-btn {
            width: 56px;
            height: 56px;
            background: #25D366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(37,211,102,.4);
            cursor: pointer;
            border: none;
            transition: transform .2s, box-shadow .2s;
        }
        .wa-btn:hover { transform: scale(1.08); box-shadow: 0 6px 20px rgba(37,211,102,.5); }

        .hero h1 {
            font-size: clamp(52px, 10vw, 110px);
            font-weight: 900;
            line-height: .88;
            letter-spacing: -.03em;
            color: #fff;
            margin-bottom: 10px;
        }

        .hero h1 span {
            color: var(--dorado-300);
        }

        .hero-sub {
            font-family: var(--serif);
            font-style: italic;
            font-size: clamp(16px, 2vw, 22px);
            color: rgba(255,255,255,.55);
            margin-bottom: 48px;
            margin-top: 18px;
            letter-spacing: .01em;
        }

        .btn-cta {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: var(--dorado);
            color: var(--azul-900);
            padding: 18px 40px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: .18em;
            text-transform: uppercase;
            border: none;
            border-radius: 10px;
            transition: all .25s;
            box-shadow: 0 8px 32px rgba(200,169,110,.25);
        }
        .btn-cta:hover {
            background: var(--dorado-300);
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(200,169,110,.35);
        }
        .btn-cta svg { flex-shrink: 0; }
    </style>
</head>
