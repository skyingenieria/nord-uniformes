<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NORD Uniformes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,300;0,400;0,600;0,700;0,800;0,900&family=Cormorant+Garamond:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul:#1E2D4A;--azul-900:#0F172E;--dorado:#C8A96E;--dorado-700:#A6884B;--dorado-300:#E0CBA0;
            --crema:#F4F1EA;--sans:"Mulish",system-ui,sans-serif;--serif:"Cormorant Garamond",serif;
            --pad-x:clamp(20px,5vw,80px);--max:1280px;
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html{scroll-behavior:smooth}
        body{font-family:var(--sans);background:var(--azul-900);color:#fff;-webkit-font-smoothing:antialiased}
        a{text-decoration:none}

        header{background:rgba(244,241,234,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(30,45,74,.08);position:sticky;top:0;z-index:100}
        .header-container{max-width:var(--max);margin:0 auto;padding:0 var(--pad-x);height:64px;display:flex;justify-content:space-between;align-items:center}
        .brand-logo .nord{font-weight:900;font-size:22px;letter-spacing:.06em;display:block;color:var(--azul-900)}
        .brand-logo .uniformes{font-weight:300;font-size:6px;letter-spacing:.55em;display:block;margin-top:2px;padding-left:.55em;color:var(--azul-900)}

        .hero{background:linear-gradient(135deg,var(--azul-900) 0%,#1a2a3f 100%);color:var(--crema);padding:clamp(80px,15vh,160px) var(--pad-x);min-height:90vh;display:flex;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden}
        .hero::before{content:"";position:absolute;inset:0;background:radial-gradient(800px 500px at 20% 35%,rgba(200,169,110,.08),transparent 55%)}
        .hero-content{max-width:720px;position:relative;z-index:2}
        .hero h1{font-size:clamp(48px,9vw,96px);font-weight:900;line-height:.92;letter-spacing:-.02em;margin-bottom:28px}
        .hero .lede{font-family:var(--serif);font-style:italic;font-size:clamp(20px,2.4vw,28px);color:var(--dorado-300);margin-bottom:44px;line-height:1.35}
        .btn-cta{display:inline-flex;align-items:center;gap:10px;background:transparent;color:var(--crema);padding:16px 36px;font-size:12px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;border:1px solid var(--dorado);transition:all .25s;border-radius:10px}
        .btn-cta:hover{background:var(--dorado);color:var(--azul-900)}
    </style>
</head>
<body>

<header>
    <div class="header-container">
        <a href="/" class="brand-logo">
            <span class="nord">NORD</span>
            <span class="uniformes">UNIFORMES</span>
        </a>
    </div>
</header>

<section class="hero">
    <div class="hero-content">
        <h1>Hecho para durar.</h1>
        <p class="lede">Uniformes escolares con criterio, resistencia y diseño.</p>
        <a class="btn-cta" href="/wellspring">Ver tienda Wellspring</a>
    </div>
</section>

</body>
</html>
