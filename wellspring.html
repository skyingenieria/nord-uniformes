<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NORD Uniformes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,300;0,400;0,600;0,700;0,800;0,900&family=Cormorant+Garamond:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --azul:#1E2D4A;--azul-900:#0F172E;--azul-400:#6B7B9C;
      --dorado:#C8A96E;--dorado-700:#A6884B;--dorado-300:#E0CBA0;
      --niebla-200:#D3DAE5;--crema:#F4F1EA;--crema-2:#ECE7DC;--blanco:#FFFFFF;
      --sans:"Mulish",system-ui,sans-serif;--serif:"Cormorant Garamond",serif;
      --pad-x:clamp(20px,5vw,80px);--max:1280px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--sans);background:var(--crema);color:var(--azul-900);line-height:1.55;-webkit-font-smoothing:antialiased}
    img{max-width:100%;display:block}
    a{text-decoration:none}

    header{background:rgba(244,241,234,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(30,45,74,.08);position:sticky;top:0;z-index:100}
    .header-container{max-width:var(--max);margin:0 auto;padding:0 var(--pad-x);height:64px;display:flex;justify-content:space-between;align-items:center}
    .brand-logo .nord{font-weight:900;font-size:22px;letter-spacing:.06em;display:block;color:var(--azul-900)}
    .brand-logo .uniformes{font-weight:300;font-size:6px;letter-spacing:.55em;display:block;margin-top:2px;padding-left:.55em;color:var(--azul-900)}
    .cart-btn{background:none;border:1px solid rgba(30,45,74,.2);padding:10px 14px;cursor:pointer;border-radius:8px;font-weight:700;font-size:11px;color:var(--azul-900);position:relative}
    .cart-badge{position:absolute;top:-8px;right:-8px;background:var(--dorado);color:var(--azul-900);font-weight:800;font-size:10px;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center}

    .hero{max-width:var(--max);margin:0 auto;padding:80px var(--pad-x);display:grid;grid-template-columns:2fr 1fr;gap:40px;align-items:center;min-height:60vh}
    .hero h1{font-size:clamp(32px,6vw,56px);font-weight:900;letter-spacing:-.02em;line-height:1.1}
    .hero-sidebar{background:var(--azul-900);color:var(--crema);padding:40px 32px;border-radius:14px;text-align:center;display:flex;flex-direction:column;justify-content:center;gap:20px}
    .hero-sidebar h3{font-size:24px;font-weight:900;font-family:var(--serif);font-style:italic}
    .hero-sidebar p{font-size:14px;color:var(--crema);margin-bottom:20px}
    .hero-sidebar a{background:var(--dorado);color:var(--azul-900);padding:14px 28px;border-radius:10px;font-weight:800;font-size:13px;letter-spacing:.12em;text-transform:uppercase;display:inline-block;transition:background .2s}
    .hero-sidebar a:hover{background:var(--dorado-700)}

    .catalog{max-width:var(--max);margin:0 auto;padding:0 var(--pad-x) 80px}
    .catalog-title{font-size:28px;font-weight:900;margin-bottom:40px;text-align:center}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:28px}

    .card{background:var(--blanco);border:1px solid var(--niebla-200);border-radius:14px;overflow:hidden;cursor:pointer;transition:box-shadow .2s,transform .2s}
    .card:hover{box-shadow:0 8px 24px rgba(30,45,74,.12);transform:translateY(-4px)}
    .card-img{width:100%;height:240px;object-fit:cover;background:var(--crema-2)}
    .card-body{padding:24px}
    .card-name{font-size:16px;font-weight:700;margin-bottom:8px}
    .card-price{font-size:18px;font-weight:800;color:var(--dorado);margin-bottom:4px}
    .card-desc{font-size:12px;color:var(--azul-400);line-height:1.4}

    .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center}
    .modal.active{display:flex}
    .modal-content{background:var(--blanco);border-radius:14px;padding:40px;max-width:500px;width:90%;max-height:90vh;overflow-y:auto;position:relative}
    .modal-close{position:absolute;top:20px;right:20px;background:none;border:none;font-size:24px;cursor:pointer;color:var(--azul-400)}
    .modal-img{width:100%;height:280px;object-fit:cover;border-radius:10px;margin-bottom:24px}
    .modal-name{font-size:22px;font-weight:900;margin-bottom:8px}
    .modal-price{font-size:20px;font-weight:800;color:var(--dorado);margin-bottom:24px}
    .talle-label{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--azul-400);margin-bottom:12px}
    .talle-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
    .talle-btn{background:var(--crema-2);border:1px solid var(--niebla-200);padding:12px;font-size:11px;cursor:pointer;border-radius:8px;font-weight:700;transition:all .15s}
    .talle-btn:hover{background:var(--azul-900);color:var(--crema);border-color:var(--azul-900)}
    .talle-btn.selected{background:var(--azul-900);color:var(--crema);border-color:var(--azul-900)}
    .qty-label{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--azul-400);margin-bottom:12px}
    .qty-wrap{display:flex;gap:8px;align-items:center;margin-bottom:24px}
    .qty-btn{width:32px;height:32px;border:1px solid var(--niebla-200);background:none;cursor:pointer;border-radius:6px;font-weight:700;font-size:14px;transition:all .15s}
    .qty-btn:hover{background:var(--azul-900);color:var(--crema);border-color:var(--azul-900)}
    .qty-num{flex:1;text-align:center;font-weight:700;font-size:16px}
    .btn-add{width:100%;background:var(--dorado);color:var(--azul-900);border:none;padding:14px;font-weight:800;cursor:pointer;border-radius:10px;font-size:12px;letter-spacing:.12em;text-transform:uppercase;transition:background .2s}
    .btn-add:hover{background:var(--dorado-700)}

    @media(max-width:900px){
      .hero{grid-template-columns:1fr;min-height:auto}
      .hero-sidebar{grid-row:1}
      .grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px}
      .card-img{height:160px}
    }
  </style>
</head>
<body>

<header>
  <div class="header-container">
    <a href="/" class="brand-logo">
      <span class="nord">NORD</span>
      <span class="uniformes">UNIFORMES</span>
    </a>
    <button class="cart-btn" onclick="window.location.href='/carrito'">
      🛒 Carrito
      <span class="cart-badge" id="cart-count" style="display:none">0</span>
    </button>
  </div>
</header>

<div class="hero">
  <div>
    <h1>Uniformes escolares de calidad</h1>
  </div>
  <div class="hero-sidebar">
    <h3>Wellspring</h3>
    <p>Tienda oficial del colegio Wellspring Pilar</p>
    <a href="#productos">Entrar a la tienda</a>
  </div>
</div>

<div class="catalog">
  <h2 class="catalog-title" id="productos">Nuestros productos</h2>

  <h3 style="font-size:20px;font-weight:700;margin:40px 0 24px;color:var(--azul-900)">🎒 Kinder</h3>
  <div class="grid" id="grid-kinder"></div>

  <h3 style="font-size:20px;font-weight:700;margin:40px 0 24px;color:var(--azul-900)">📚 Primaria</h3>
  <div class="grid" id="grid-primaria"></div>

  <h3 style="font-size:20px;font-weight:700;margin:40px 0 24px;color:var(--azul-900)">🎓 Secundaria</h3>
  <div class="grid" id="grid-secundaria"></div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <img id="modal-img" class="modal-img">
    <h3 id="modal-name" class="modal-name"></h3>
    <div id="modal-price" class="modal-price"></div>

    <div class="talle-label">Selecciona talle:</div>
    <div class="talle-grid" id="modal-talles"></div>

    <div class="qty-label">Cantidad:</div>
    <div class="qty-wrap">
      <button class="qty-btn" onclick="changeModalQty(-1)">−</button>
      <span class="qty-num" id="modal-qty">1</span>
      <button class="qty-btn" onclick="changeModalQty(1)">+</button>
    </div>

    <button class="btn-add" onclick="addFromModal()">Agregar al carrito</button>
  </div>
</div>

<script>
function getCart() { try { return JSON.parse(localStorage.getItem("nord_cart") || "[]"); } catch { return []; } }
function saveCart(c) { localStorage.setItem("nord_cart", JSON.stringify(c)); }
function fmt(n) { return "$" + Number(n).toLocaleString("es-AR"); }
function updateCartBadge() {
  const cart = getCart();
  const count = cart.reduce((s, i) => s + i.qty, 0);
  const badge = document.getElementById("cart-count");
  if (count > 0) { badge.textContent = count; badge.style.display = "flex"; }
  else badge.style.display = "none";
}

let modalProduct = null;
let modalTalle = null;
let modalQty = 1;

async function render() {
  try {
    const res = await fetch("/api/products");
    const products = await res.json();

    const cardHTML = (p) => `
      <div class="card" onclick="openModal('${p.id}')">
        <img src="${p.imagen}" class="card-img" onerror="this.src='https://via.placeholder.com/280x240?text=${encodeURIComponent(p.nombre)}'">
        <div class="card-body">
          <div class="card-name">${p.nombre}</div>
          <div class="card-price">${fmt(p.precio)}</div>
          <div class="card-desc">Haz clic para ver talles disponibles</div>
        </div>
      </div>`;

    // Distribuir productos en tres secciones
    const third = Math.ceil(products.length / 3);
    const kinder = products.slice(0, third);
    const primaria = products.slice(third, third * 2);
    const secundaria = products.slice(third * 2);

    document.getElementById("grid-kinder").innerHTML = kinder.map(cardHTML).join("");
    document.getElementById("grid-primaria").innerHTML = primaria.map(cardHTML).join("");
    document.getElementById("grid-secundaria").innerHTML = secundaria.map(cardHTML).join("");

    updateCartBadge();
  } catch (err) {
    document.getElementById("grid-kinder").innerHTML = "<p>Error cargando productos</p>";
  }
}

async function openModal(productId) {
  try {
    const res = await fetch("/api/products");
    const products = await res.json();
    const p = products.find(x => x.id === productId);
    if (!p) return;

    modalProduct = p;
    modalTalle = p.talles[0];
    modalQty = 1;

    document.getElementById("modal-img").src = p.imagen;
    document.getElementById("modal-name").textContent = p.nombre;
    document.getElementById("modal-price").textContent = fmt(p.precio);
    document.getElementById("modal-qty").textContent = "1";

    const tallesDiv = document.getElementById("modal-talles");
    tallesDiv.innerHTML = p.talles.map(t => `
      <button class="talle-btn ${t === p.talles[0] ? 'selected' : ''}" onclick="selectTalle('${t}')">
        ${t}
      </button>`).join("");

    document.getElementById("modal").classList.add("active");
  } catch (err) { alert("Error cargando producto"); }
}

function closeModal() {
  document.getElementById("modal").classList.remove("active");
  modalProduct = null;
}

function selectTalle(talle) {
  modalTalle = talle;
  document.querySelectorAll(".talle-btn").forEach(btn => {
    btn.classList.toggle("selected", btn.textContent.trim() === talle);
  });
}

function changeModalQty(d) {
  modalQty += d;
  if (modalQty < 1) modalQty = 1;
  document.getElementById("modal-qty").textContent = modalQty;
}

function addFromModal() {
  if (!modalProduct) return;

  const item = {
    id: modalProduct.id,
    nombre: modalProduct.nombre,
    precio: modalProduct.precio,
    imagen: modalProduct.imagen,
    talle: modalTalle,
    qty: modalQty,
    key: `${modalProduct.id}-${modalTalle}`,
  };

  const cart = getCart();
  const existing = cart.find(i => i.key === item.key);
  if (existing) existing.qty += item.qty;
  else cart.push(item);
  saveCart(cart);
  updateCartBadge();

  alert(`✓ Agregado: ${item.nombre} (${item.talle}) x${item.qty}`);
  closeModal();
}

render();
</script>
</body>
</html>
