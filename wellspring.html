<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NORD Uniformes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,300;0,400;0,600;0,700;0,800;0,900&family=Cormorant+Garamond:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --azul:#1E2D4A;--azul-900:#0F172E;--azul-600:#34466A;--azul-400:#6B7B9C;
      --dorado:#C8A96E;--dorado-700:#A6884B;--dorado-300:#E0CBA0;
      --niebla:#8A9AB5;--niebla-200:#D3DAE5;
      --crema:#F4F1EA;--crema-2:#ECE7DC;--blanco:#FFFFFF;
      --sans:"Mulish",system-ui,sans-serif;--serif:"Cormorant Garamond",serif;
      --pad-x:clamp(20px,5vw,80px);--max:1280px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--sans);background:var(--crema);color:var(--azul-900);line-height:1.55;-webkit-font-smoothing:antialiased}
    img{max-width:100%;display:block}
    a{text-decoration:none}

    header{background:rgba(244,241,234,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(30,45,74,.08);position:sticky;top:0;z-index:100}
    .header-container{max-width:var(--max);margin:0 auto;padding:0 var(--pad-x);height:64px;display:flex;justify-content:space-between;align-items:center}
    .brand-logo .nord{font-weight:900;font-size:22px;letter-spacing:.06em;display:block;color:var(--azul-900)}
    .brand-logo .uniformes{font-weight:300;font-size:6px;letter-spacing:.55em;display:block;margin-top:2px;padding-left:.55em;color:var(--azul-900)}
    .cart-btn{background:none;border:1px solid rgba(30,45,74,.2);padding:10px 14px;cursor:pointer;border-radius:8px;font-weight:700;font-size:11px;color:var(--azul);position:relative}
    .cart-badge{position:absolute;top:-8px;right:-8px;background:var(--dorado);color:var(--azul-900);font-weight:800;font-size:10px;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center}

    .hero{max-width:var(--max);margin:0 auto;padding:60px var(--pad-x);display:grid;grid-template-columns:2fr 1fr;gap:40px;align-items:center}
    .hero-content h1{font-size:clamp(32px,6vw,56px);font-weight:900;letter-spacing:-.02em;margin-bottom:24px;line-height:1.1}
    .hero-content p{font-size:18px;color:var(--azul-600);margin-bottom:32px;line-height:1.6}
    .hero-sidebar{background:var(--azul-900);color:var(--crema);padding:40px 32px;border-radius:14px;text-align:center;display:flex;flex-direction:column;justify-content:center;gap:20px}
    .hero-sidebar h3{font-size:24px;font-weight:900;font-family:var(--serif);font-style:italic}
    .hero-sidebar p{font-size:14px;color:var(--crema);margin-bottom:20px}
    .hero-sidebar a{background:var(--dorado);color:var(--azul-900);padding:14px 28px;border-radius:10px;font-weight:800;font-size:13px;letter-spacing:.12em;text-transform:uppercase;display:inline-block;transition:background .2s}
    .hero-sidebar a:hover{background:var(--dorado-700)}

    .catalog{max-width:var(--max);margin:0 auto;padding:0 var(--pad-x) 80px}
    .catalog-title{font-size:28px;font-weight:900;margin-bottom:40px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:28px}

    .card{background:var(--blanco);border:1px solid var(--niebla-200);border-radius:14px;overflow:hidden;transition:box-shadow .2s,transform .2s}
    .card:hover{box-shadow:0 4px 20px rgba(30,45,74,.1);transform:translateY(-2px)}
    .card-img{width:100%;height:200px;object-fit:cover;background:var(--crema-2)}
    .card-body{padding:20px}
    .card-name{font-size:14px;font-weight:700;margin-bottom:8px}
    .card-price{font-size:16px;font-weight:800;color:var(--dorado);margin-bottom:16px}
    .card-talle{font-size:11px;color:var(--azul-400);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;font-weight:600}
    .talle-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
    .talle-btn{background:var(--crema-2);border:1px solid var(--niebla-200);padding:8px;font-size:10px;cursor:pointer;border-radius:6px;font-weight:600;transition:all .15s}
    .talle-btn:hover{background:var(--azul-900);color:var(--crema);border-color:var(--azul-900)}
    .talle-btn.selected{background:var(--azul-900);color:var(--crema);border-color:var(--azul-900)}
    .qty-wrap{display:flex;gap:6px;align-items:center;margin-bottom:12px}
    .qty-btn{width:24px;height:24px;border:1px solid var(--niebla-200);background:none;cursor:pointer;border-radius:4px;font-weight:600;transition:all .15s}
    .qty-btn:hover{background:var(--azul-900);color:var(--crema);border-color:var(--azul-900)}
    .qty-num{flex:1;text-align:center;font-weight:600}
    .btn-add{width:100%;background:var(--dorado);color:var(--azul-900);border:none;padding:11px;font-weight:800;cursor:pointer;border-radius:8px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;transition:background .2s}
    .btn-add:hover{background:var(--dorado-700)}
    .btn-add:disabled{background:var(--niebla-200);color:var(--azul-400);cursor:not-allowed}

    @media(max-width:900px){
      .hero{grid-template-columns:1fr}
      .hero-sidebar{grid-row:1}
      .grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px}
    }
  </style>
</head>
<body>

<header>
  <div class="header-container">
    <a href="/" class="brand-logo">
      <span class="nord">NORD</span>
      <span class="uniformes">UNIFORMES</span>
    </a>
    <button class="cart-btn" onclick="window.location.href='/carrito'">
      🛒 Carrito
      <span class="cart-badge" id="cart-count" style="display:none">0</span>
    </button>
  </div>
</header>

<div class="hero">
  <div class="hero-content">
    <h1>Uniformes escolares de calidad</h1>
    <p>Diseñados para comodidad y durabilidad. Elegí talle, cantidad y confirmá tu compra.</p>
  </div>
  <div class="hero-sidebar">
    <h3>Wellspring</h3>
    <p>Tienda oficial del colegio Wellspring Pilar</p>
    <a href="#productos">Entrar a la tienda</a>
  </div>
</div>

<div class="catalog">
  <h2 class="catalog-title" id="productos">Nuestros productos</h2>
  <div class="grid" id="grid"></div>
</div>

<script>
function getCart() { try { return JSON.parse(localStorage.getItem("nord_cart") || "[]"); } catch { return []; } }
function saveCart(c) { localStorage.setItem("nord_cart", JSON.stringify(c)); }
function fmt(n) { return "$" + Number(n).toLocaleString("es-AR"); }
function updateCartBadge() {
  const cart = getCart();
  const count = cart.reduce((s, i) => s + i.qty, 0);
  const badge = document.getElementById("cart-count");
  if (count > 0) { badge.textContent = count; badge.style.display = "flex"; }
  else badge.style.display = "none";
}

async function render() {
  try {
    const res = await fetch("/api/products");
    const products = await res.json();

    const html = products.map(p => {
      const key = `${p.id}-TALLE`;
      return `
        <div class="card">
          <img src="${p.imagen}" class="card-img" onerror="this.src='https://via.placeholder.com/240x200?text=${encodeURIComponent(p.nombre)}'">
          <div class="card-body">
            <div class="card-name">${p.nombre}</div>
            <div class="card-price">${fmt(p.precio)}</div>
            <div class="card-talle">Selecciona talle:</div>
            <div class="talle-grid" id="talles-${p.id}"></div>
            <div class="qty-wrap">
              <button class="qty-btn" onclick="changeQty('${p.id}', -1)">−</button>
              <span class="qty-num" id="qty-${p.id}">1</span>
              <button class="qty-btn" onclick="changeQty('${p.id}', 1)">+</button>
            </div>
            <button class="btn-add" id="btn-${p.id}" onclick="addToCart('${p.id}')">Agregar</button>
          </div>
        </div>`;
    }).join("");
    document.getElementById("grid").innerHTML = html;

    // Talles y eventos
    products.forEach(p => {
      const tallDiv = document.getElementById(`talles-${p.id}`);
      p.talles.forEach(t => {
        const btn = document.createElement("button");
        btn.className = "talle-btn selected";
        btn.textContent = t;
        btn.type = "button";
        btn.onclick = (e) => {
          e.preventDefault();
          document.querySelectorAll(`#talles-${p.id} .talle-btn`).forEach(b => b.classList.remove("selected"));
          btn.classList.add("selected");
          window.selectedTalles = window.selectedTalles || {};
          window.selectedTalles[p.id] = t;
        };
        tallDiv.appendChild(btn);
        if (!window.selectedTalles) window.selectedTalles = {};
        if (!window.selectedTalles[p.id]) window.selectedTalles[p.id] = t;
      });
    });

    updateCartBadge();
  } catch (err) { document.getElementById("grid").innerHTML = "<p>Error cargando productos</p>"; }
}

window.qty = {};
function changeQty(pid, d) {
  window.qty[pid] = (window.qty[pid] || 1) + d;
  if (window.qty[pid] < 1) window.qty[pid] = 1;
  document.getElementById(`qty-${pid}`).textContent = window.qty[pid];
}

function addToCart(pid) {
  const products = document.querySelectorAll(".card");
  let p = null;
  products.forEach(card => {
    if (card.querySelector(`#btn-${pid}`)) {
      p = {
        id: pid,
        nombre: card.querySelector(".card-name").textContent,
        precio: parseInt(card.querySelector(".card-price").textContent.replace(/\D/g, "")),
        imagen: card.querySelector(".card-img").src,
      };
    }
  });

  if (!p) return;
  p.talle = window.selectedTalles?.[pid] || "S";
  p.qty = window.qty[pid] || 1;
  p.key = `${p.id}-${p.talle}`;

  const cart = getCart();
  const existing = cart.find(i => i.key === p.key);
  if (existing) existing.qty += p.qty;
  else cart.push(p);
  saveCart(cart);
  updateCartBadge();
  alert(`✓ Agregado: ${p.nombre} (Talle ${p.talle}) x${p.qty}`);
}

render();
</script>
</body>
</html>
