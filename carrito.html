<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tu carrito — NORD Uniformes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,300;0,400;0,600;0,700;0,800;0,900&family=Cormorant+Garamond:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --azul:      #1E2D4A;
      --azul-900:  #0F172E;
      --azul-600:  #34466A;
      --azul-400:  #6B7B9C;
      --dorado:    #C8A96E;
      --dorado-700:#A6884B;
      --dorado-300:#E0CBA0;
      --niebla:    #8A9AB5;
      --niebla-200:#D3DAE5;
      --crema:     #F4F1EA;
      --crema-2:   #ECE7DC;
      --blanco:    #FFFFFF;
      --negro:     #0A0E18;
      --sans:      "Mulish", system-ui, sans-serif;
      --serif:     "Cormorant Garamond", serif;
      --pad-x:     clamp(20px, 5vw, 80px);
      --max:       1280px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--sans);
      background-color: var(--crema);
      color: var(--azul-900);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; }

    /* HEADER */
    header {
      background-color: rgba(244,241,234,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(30,45,74,0.08);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-container {
      max-width: var(--max);
      margin: 0 auto;
      padding: 0 var(--pad-x);
      height: 64px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .brand-logo { color: var(--azul-900); line-height: 0.88; }
    .brand-logo .nord { font-weight: 900; font-size: 22px; letter-spacing: 0.06em; display: block; }
    .brand-logo .uniformes { font-weight: 300; font-size: 6px; letter-spacing: 0.55em; display: block; margin-top: 2px; padding-left: 0.55em; }
    .back-link {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--azul-400);
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--azul-900); }

    /* LAYOUT */
    .page-wrapper {
      max-width: 960px;
      margin: 0 auto;
      padding: 60px var(--pad-x) 80px;
    }
    .page-title {
      font-size: clamp(28px, 4vw, 40px);
      font-weight: 900;
      letter-spacing: -0.02em;
      margin-bottom: 48px;
    }
    .cart-layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 48px;
      align-items: start;
    }

    /* ITEMS */
    .cart-items { display: flex; flex-direction: column; gap: 0; }
    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      border-bottom: 1px solid var(--niebla-200);
      gap: 16px;
    }
    .cart-item:first-child { border-top: 1px solid var(--niebla-200); }
    .item-info { flex: 1; }
    .item-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--azul-900);
      margin-bottom: 4px;
    }
    .item-talle {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--azul-400);
    }
    .item-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .qty-btn {
      width: 28px;
      height: 28px;
      border: 1px solid var(--niebla-200);
      background: none;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--azul);
      transition: all 0.15s;
    }
    .qty-btn:hover { border-color: var(--azul); background-color: var(--azul); color: var(--crema); }
    .qty-display {
      font-size: 15px;
      font-weight: 700;
      min-width: 20px;
      text-align: center;
    }
    .item-price {
      font-size: 16px;
      font-weight: 700;
      color: var(--azul-900);
      min-width: 80px;
      text-align: right;
    }
    .item-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--niebla);
      padding: 4px;
      transition: color 0.15s;
      display: flex;
    }
    .item-remove:hover { color: #c0392b; }

    /* EMPTY STATE */
    .cart-empty {
      text-align: center;
      padding: 80px 0;
      grid-column: 1 / -1;
    }
    .cart-empty p {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--azul-400);
      margin-bottom: 24px;
    }
    .btn-outline {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--azul);
      color: var(--azul);
      padding: 12px 28px;
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .btn-outline:hover { background-color: var(--azul-900); color: var(--crema); border-color: var(--azul-900); }

    /* SUMMARY PANEL */
    .summary-panel {
      background: var(--blanco);
      border: 1px solid var(--niebla-200);
      padding: 32px;
      position: sticky;
      top: 80px;
    }
    .summary-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--azul-400);
      margin-bottom: 24px;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      padding: 8px 0;
      color: var(--azul-600);
    }
    .summary-row.total {
      border-top: 1px solid var(--niebla-200);
      margin-top: 8px;
      padding-top: 16px;
      font-size: 20px;
      font-weight: 800;
      color: var(--azul-900);
    }

    /* FORM */
    .form-section { margin-top: 28px; }
    .form-section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--azul-400);
      margin-bottom: 14px;
    }
    .form-group { margin-bottom: 12px; }
    .form-group input {
      width: 100%;
      border: 1px solid var(--niebla-200);
      background: var(--crema);
      padding: 12px 14px;
      font-family: var(--sans);
      font-size: 14px;
      color: var(--azul-900);
      outline: none;
      transition: border-color 0.15s;
    }
    .form-group input:focus { border-color: var(--azul); }
    .form-group input::placeholder { color: var(--niebla); }

    /* CTA WHATSAPP */
    .btn-whatsapp-cta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      margin-top: 20px;
      background-color: #25D366;
      color: #fff;
      border: none;
      padding: 16px;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background-color 0.2s;
      text-decoration: none;
    }
    .btn-whatsapp-cta:hover { background-color: #1ebe5d; }
    .btn-whatsapp-cta svg { flex-shrink: 0; }

    .note {
      margin-top: 14px;
      font-size: 11px;
      color: var(--azul-400);
      line-height: 1.5;
      text-align: center;
    }

    @media (max-width: 768px) {
      .cart-layout { grid-template-columns: 1fr; }
      .summary-panel { position: static; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-container">
    <a href="/" class="brand-logo">
      <span class="nord">NORD</span>
      <span class="uniformes">UNIFORMES</span>
    </a>
    <a href="/wellspring" class="back-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Seguir comprando
    </a>
  </div>
</header>

<div class="page-wrapper">
  <h1 class="page-title">Tu carrito</h1>

  <div class="cart-layout" id="cart-layout">
    <div class="cart-empty">
      <p>Tu carrito está vacío</p>
      <a href="/wellspring" class="btn-outline">Ver catálogo</a>
    </div>
  </div>
</div>

<script>
  const WHATSAPP_NUMBER = "5491122913796";

  function getCart() {
    try { return JSON.parse(localStorage.getItem("nord_cart") || "[]"); }
    catch { return []; }
  }
  function saveCart(cart) {
    localStorage.setItem("nord_cart", JSON.stringify(cart));
  }

  function fmt(n) {
    return "$" + Number(n).toLocaleString("es-AR");
  }

  function changeQty(key, delta) {
    const cart = getCart();
    const item = cart.find(i => i.key === key);
    if (!item) return;
    item.qty += delta;
    if (item.qty <= 0) {
      const idx = cart.indexOf(item);
      cart.splice(idx, 1);
    }
    saveCart(cart);
    render();
  }

  function removeItem(key) {
    const cart = getCart().filter(i => i.key !== key);
    saveCart(cart);
    render();
  }

  function buildWhatsAppMessage() {
    const cart = getCart();
    const nombre = document.getElementById("inp-nombre")?.value.trim() || "";
    const tel = document.getElementById("inp-tel")?.value.trim() || "";

    let lines = ["Hola! Quiero hacer un pedido de uniformes Wellspring:%0A"];
    cart.forEach(item => {
      lines.push(`- ${item.nombre} talle ${item.talle} x${item.qty} — ${fmt(item.precio * item.qty)}`);
    });
    const total = cart.reduce((s, i) => s + i.precio * i.qty, 0);
    lines.push(`%0ATotal: ${fmt(total)}`);
    if (nombre) lines.push(`Nombre: ${nombre}`);
    if (tel) lines.push(`Teléfono: ${tel}`);

    return lines.join("%0A");
  }

  function render() {
    const cart = getCart();
    const layout = document.getElementById("cart-layout");

    if (!cart.length) {
      layout.innerHTML = `
        <div class="cart-empty">
          <p>Tu carrito está vacío</p>
          <a href="/wellspring" class="btn-outline">Ver catálogo</a>
        </div>`;
      return;
    }

    const subtotal = cart.reduce((s, i) => s + i.precio * i.qty, 0);
    const totalItems = cart.reduce((s, i) => s + i.qty, 0);

    const itemsHtml = cart.map(item => `
      <div class="cart-item">
        <div class="item-info">
          <p class="item-name">${item.nombre}</p>
          <p class="item-talle">Talle ${item.talle}</p>
        </div>
        <div class="item-controls">
          <button class="qty-btn" onclick="changeQty('${item.key}', -1)">−</button>
          <span class="qty-display">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty('${item.key}', 1)">+</button>
        </div>
        <div class="item-price">${fmt(item.precio * item.qty)}</div>
        <button class="item-remove" onclick="removeItem('${item.key}')" title="Eliminar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>`).join("");

    layout.innerHTML = `
      <div class="cart-items">${itemsHtml}</div>

      <div class="summary-panel">
        <p class="summary-title">Resumen</p>
        <div class="summary-row"><span>${totalItems} ${totalItems === 1 ? "artículo" : "artículos"}</span><span>${fmt(subtotal)}</span></div>
        <div class="summary-row"><span>Envío</span><span>A coordinar</span></div>
        <div class="summary-row total"><span>Total</span><span>${fmt(subtotal)}</span></div>

        <div class="form-section">
          <p class="form-section-label">Tus datos (opcional)</p>
          <div class="form-group">
            <input type="text" id="inp-nombre" placeholder="Nombre y apellido">
          </div>
          <div class="form-group">
            <input type="tel" id="inp-tel" placeholder="Teléfono">
          </div>
        </div>

        <a class="btn-whatsapp-cta" id="btn-wp" href="#" target="_blank" rel="noopener noreferrer">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Enviar pedido por WhatsApp
        </a>
        <p class="note">Te vamos a confirmar disponibilidad, método de pago y entrega por chat.</p>
      </div>`;

    // Actualizar href del botón WhatsApp dinámicamente cuando el usuario escribe
    document.getElementById("inp-nombre")?.addEventListener("input", updateWpLink);
    document.getElementById("inp-tel")?.addEventListener("input", updateWpLink);
    updateWpLink();
  }

  function updateWpLink() {
    const btn = document.getElementById("btn-wp");
    if (!btn) return;
    const msg = buildWhatsAppMessage();
    btn.href = `https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`;
  }

  render();
</script>
</body>
</html>
