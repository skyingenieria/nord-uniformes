<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tu carrito — NORD Uniformes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,300;0,400;0,600;0,700;0,800;0,900&family=Cormorant+Garamond:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --azul:#1E2D4A;--azul-900:#0F172E;--azul-600:#34466A;--azul-400:#6B7B9C;
      --dorado:#C8A96E;--dorado-700:#A6884B;--dorado-300:#E0CBA0;
      --niebla:#8A9AB5;--niebla-200:#D3DAE5;
      --crema:#F4F1EA;--crema-2:#ECE7DC;--blanco:#FFFFFF;
      --sans:"Mulish",system-ui,sans-serif;--serif:"Cormorant Garamond",serif;
      --pad-x:clamp(20px,5vw,80px);--max:1200px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--sans);background:var(--crema);color:var(--azul-900);line-height:1.55;-webkit-font-smoothing:antialiased}
    a{text-decoration:none}

    /* HEADER */
    header{background:rgba(244,241,234,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(30,45,74,.08);position:sticky;top:0;z-index:100}
    .header-container{max-width:var(--max);margin:0 auto;padding:0 var(--pad-x);height:64px;display:flex;justify-content:space-between;align-items:center}
    .brand-logo .nord{font-weight:900;font-size:22px;letter-spacing:.06em;display:block;color:var(--azul-900)}
    .brand-logo .uniformes{font-weight:300;font-size:6px;letter-spacing:.55em;display:block;margin-top:2px;padding-left:.55em;color:var(--azul-900)}
    .back-link{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--azul-400);display:flex;align-items:center;gap:6px;transition:color .2s}
    .back-link:hover{color:var(--azul-900)}

    /* PAGE */
    .page{max-width:var(--max);margin:0 auto;padding:48px var(--pad-x) 80px}
    .page-title{font-size:clamp(28px,4vw,40px);font-weight:900;letter-spacing:-.02em;margin-bottom:40px}
    .checkout-grid{display:grid;grid-template-columns:1fr 380px;gap:40px;align-items:start}

    /* LEFT */
    .left{display:flex;flex-direction:column;gap:28px}

    /* SECTION */
    .section-block{background:var(--blanco);border:1px solid var(--niebla-200);padding:24px 28px;border-radius:14px;box-shadow:0 2px 12px rgba(30,45,74,.06);transition:box-shadow .3s}
    .section-block:hover{box-shadow:0 4px 20px rgba(30,45,74,.1)}
    .section-block-title{font-size:11px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--azul-400);margin-bottom:18px}

    /* ITEMS */
    .cart-item{display:flex;align-items:center;padding:14px 0;border-bottom:1px solid var(--niebla-200);gap:14px}
    .cart-item:first-child{border-top:1px solid var(--niebla-200)}
    .item-info{flex:1}
    .item-name{font-size:14px;font-weight:700}
    .item-talle{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--azul-400);margin-top:2px}
    .qty-wrap{display:flex;align-items:center;gap:10px}
    .qty-btn{width:27px;height:27px;border:1px solid var(--niebla-200);background:none;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--azul);transition:all .15s;border-radius:6px}
    .qty-btn:hover{background:var(--azul-900);color:var(--crema);border-color:var(--azul-900)}
    .qty-num{font-size:14px;font-weight:700;min-width:18px;text-align:center}
    .item-price{font-size:15px;font-weight:700;white-space:nowrap}
    .item-remove{background:none;border:none;cursor:pointer;color:var(--niebla);padding:4px;display:flex;transition:color .15s}
    .item-remove:hover{color:#c0392b}

    /* FORM */
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
    .form-row.full{grid-template-columns:1fr}
    .form-group label{display:block;font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--azul-400);margin-bottom:6px}
    .form-group input{width:100%;border:1px solid var(--niebla-200);background:var(--crema);padding:11px 13px;font-family:var(--sans);font-size:14px;color:var(--azul-900);outline:none;transition:border-color .15s, box-shadow .15s;border-radius:8px}
    .form-group input:focus{border-color:var(--azul);box-shadow:0 0 0 3px rgba(200,169,110,.1)}
    .form-group input::placeholder{color:#b0bac9}

    /* RADIO OPTIONS */
    .radio-options{display:flex;flex-direction:column;gap:8px}
    .radio-option{border:1.5px solid var(--niebla-200);padding:15px 16px;cursor:pointer;display:flex;align-items:flex-start;gap:12px;transition:border-color .15s,background .15s, box-shadow .15s;border-radius:10px;box-shadow:0 1px 4px rgba(30,45,74,.04)}
    .radio-option:hover{border-color:var(--azul-400);box-shadow:0 2px 8px rgba(30,45,74,.08)}
    .radio-option.selected{border-color:var(--azul-900);background:#f0f2f6;box-shadow:0 2px 8px rgba(30,45,74,.12)}
    .radio-option input[type=radio]{margin-top:3px;accent-color:var(--azul-900);width:15px;height:15px;flex-shrink:0}
    .radio-label{flex:1}
    .radio-title{font-size:14px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
    .radio-desc{font-size:12px;color:var(--azul-400);margin-top:4px;line-height:1.4}
    .badge{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px}
    .badge-green{background:#e8f5e9;color:#2e7d52}
    .badge-orange{background:#fff3e0;color:#e65100}

    /* DIRECCIÓN EXPAND */
    .addr-expand{display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--niebla-200)}
    .addr-expand.show{display:block}

    /* INFO BOX correo */
    .correo-info{margin-top:12px;padding:12px 14px;background:var(--crema-2);border-left:3px solid var(--dorado);font-size:12px;color:var(--azul-600);line-height:1.6;display:none;border-radius:8px}
    .correo-info.show{display:block}

    /* SUMMARY */
    .summary-panel{background:var(--blanco);border:1px solid var(--niebla-200);padding:28px;position:sticky;top:80px;border-radius:14px;box-shadow:0 2px 12px rgba(30,45,74,.06)}
    .summary-title{font-size:11px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--azul-400);margin-bottom:20px}
    .sum-row{display:flex;justify-content:space-between;font-size:14px;padding:7px 0;color:var(--azul-600)}
    .sum-row.total{border-top:1px solid var(--niebla-200);margin-top:8px;padding-top:16px;font-size:20px;font-weight:800;color:var(--azul-900)}
    .sum-note{font-size:11px;color:var(--azul-400);margin-top:10px;line-height:1.5;font-style:italic}

    /* PAGO DETAIL */
    .pago-detail{display:none;margin-top:14px;padding:14px 16px;background:var(--crema-2);border:1px solid var(--niebla-200);border-radius:8px}
    .pago-detail.show{display:block}
    .cbu-block{font-size:13px;line-height:2.2}
    .cbu-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .cbu-val{font-weight:800;font-size:14px;letter-spacing:.03em}
    .copy-btn{background:var(--azul-900);color:var(--crema);border:none;font-family:var(--sans);font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;cursor:pointer;transition:background .15s}
    .copy-btn:hover{background:var(--dorado);color:var(--azul-900)}
    .nave-info{font-size:13px;color:var(--azul-600);line-height:1.6}
    .nave-logo{font-weight:900;color:#5a2d9c;font-size:16px}

    /* REQUIRED mark */
    .req{color:#c0392b;margin-left:2px}
    .field-error{border-color:#c0392b !important}
    .form-group input:required:invalid:not(:placeholder-shown){border-color:#c0392b}

    /* BUTTONS */
    .btn-wp{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;margin-top:18px;background:#25D366;color:#fff;border:none;padding:15px;font-family:var(--sans);font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:background .2s, box-shadow .2s;text-decoration:none;border-radius:10px;box-shadow:0 4px 12px rgba(37,211,102,.2)}
    .btn-wp:hover{background:#1ebe5d;box-shadow:0 6px 16px rgba(37,211,102,.3)}
    .btn-nave{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;margin-top:18px;background:#5a2d9c;color:#fff;border:none;padding:15px;font-family:var(--sans);font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:background .2s, box-shadow .2s;border-radius:10px;box-shadow:0 4px 12px rgba(90,45,156,.2)}
    .btn-nave:hover{background:#4a2080;box-shadow:0 6px 16px rgba(90,45,156,.3)}
    .note{margin-top:12px;font-size:11px;color:var(--azul-400);text-align:center;line-height:1.5}

    /* EMPTY */
    .cart-empty{text-align:center;padding:80px 0;grid-column:1/-1}
    .cart-empty p{font-size:14px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--azul-400);margin-bottom:24px}
    .btn-outline{display:inline-flex;align-items:center;gap:8px;border:1.5px solid var(--azul);color:var(--azul);padding:12px 28px;font-family:var(--sans);font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;transition:all .2s;border-radius:10px}
    .btn-outline:hover{background:var(--azul-900);color:var(--crema);border-color:var(--azul-900);box-shadow:0 4px 12px rgba(15,23,46,.2)}

    @media(max-width:900px){
      .checkout-grid{grid-template-columns:1fr}
      .summary-panel{position:static}
      .form-row{grid-template-columns:1fr}
    }
  </style>
</head>
<body>

<header>
  <div class="header-container">
    <a href="/" class="brand-logo">
      <span class="nord">NORD</span>
      <span class="uniformes">UNIFORMES</span>
    </a>
    <a href="/wellspring" class="back-link">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Seguir comprando
    </a>
  </div>
</header>

<div class="page">
  <h1 class="page-title">Tu carrito</h1>
  <div class="checkout-grid" id="checkout-grid">
    <div class="cart-empty">
      <p>Tu carrito está vacío</p>
      <a href="/wellspring" class="btn-outline">Ver catálogo</a>
    </div>
  </div>
</div>

<script>
const WHATSAPP_NUMBER = "5491122913796";
// ── Completar cuando tengas las credenciales bancarias ──────────────────────
const CBU   = "TU_CBU_ACÁ";
const ALIAS = "TU.ALIAS.ACÁ";
const TITULAR = "Federico Alonso";

let selectedEnvio = "retiro";   // "retiro" | "correo"
let selectedPago  = "transferencia"; // "transferencia" | "nave"

function getCart() {
  try { return JSON.parse(localStorage.getItem("nord_cart") || "[]"); } catch { return []; }
}
function saveCart(c) { localStorage.setItem("nord_cart", JSON.stringify(c)); }
function fmt(n) { return "$" + Number(n).toLocaleString("es-AR"); }

function changeQty(key, d) {
  const cart = getCart();
  const item = cart.find(i => i.key === key);
  if (!item) return;
  item.qty += d;
  if (item.qty <= 0) cart.splice(cart.indexOf(item), 1);
  saveCart(cart); render();
}
function removeItem(key) { saveCart(getCart().filter(i => i.key !== key)); render(); }

function copyText(txt) {
  navigator.clipboard.writeText(txt).catch(() => {});
  const btns = document.querySelectorAll(".copy-btn");
  btns.forEach(b => { if (b.dataset.val === txt) { b.textContent = "✓ Copiado"; setTimeout(() => b.textContent = "Copiar", 1500); }});
}

function selectEnvio(tipo) {
  selectedEnvio = tipo;
  document.querySelectorAll(".radio-option[data-envio]").forEach(el => {
    el.classList.toggle("selected", el.dataset.envio === tipo);
    el.querySelector("input").checked = el.dataset.envio === tipo;
  });
  document.getElementById("addr-expand")?.classList.toggle("show", tipo === "correo");
  document.getElementById("correo-info")?.classList.toggle("show", tipo === "correo");
  document.getElementById("sum-envio").textContent = tipo === "retiro" ? "Gratis" : "A calcular";
  updateCta();
}

function selectPago(tipo) {
  selectedPago = tipo;
  document.querySelectorAll(".radio-option[data-pago]").forEach(el => {
    el.classList.toggle("selected", el.dataset.pago === tipo);
    el.querySelector("input").checked = el.dataset.pago === tipo;
  });
  document.getElementById("pago-transferencia")?.classList.toggle("show", tipo === "transferencia");
  document.getElementById("pago-nave")?.classList.toggle("show", tipo === "nave");
  updateCta();
}

function validate() {
  const fields = ["inp-nombre","inp-apellido","inp-tel","inp-email"];
  let ok = true;
  fields.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    if (!el.value.trim()) { el.classList.add("field-error"); ok = false; }
    else el.classList.remove("field-error");
  });
  if (!ok) { document.getElementById("inp-nombre")?.scrollIntoView({behavior:"smooth",block:"center"}); }
  return ok;
}

let currentDiscount = { codigo: "", monto: 0 };

async function validateCode() {
  const inputEl = document.getElementById("inp-codigo");
  const code = (inputEl?.value || "").trim().toUpperCase();
  const msgEl = document.getElementById("codigo-msg");

  if (!code) {
    msgEl.innerHTML = "";
    currentDiscount = { codigo: "", monto: 0 };
    render();
    return;
  }

  msgEl.innerHTML = "Validando...";
  try {
    const r = await fetch(`/api/validate-code?code=${encodeURIComponent(code)}`);
    const data = await r.json();

    if (data.valid) {
      const cart = getCart();
      const sub = cart.reduce((s, i) => s + i.precio * i.qty, 0);
      const descuento = Math.round(sub * (data.descuento / 100));
      currentDiscount = { codigo: data.codigo, monto: descuento };
      msgEl.innerHTML = `<span style="color:#2e7d52">✓ Descuento aplicado: ${data.descuento}%</span>`;
    } else {
      currentDiscount = { codigo: "", monto: 0 };
      msgEl.innerHTML = `<span style="color:#c0392b">✗ ${data.error}</span>`;
    }
  } catch (err) {
    msgEl.innerHTML = `<span style="color:#c0392b">Error validando código</span>`;
    currentDiscount = { codigo: "", monto: 0 };
  }
  render();
}

async function submitOrder() {
  if (!validate()) return;

  const nombre   = document.getElementById("inp-nombre").value.trim();
  const apellido = document.getElementById("inp-apellido").value.trim();
  const tel      = document.getElementById("inp-tel").value.trim();
  const email    = document.getElementById("inp-email").value.trim();
  const cart     = getCart();
  const sub      = cart.reduce((s, i) => s + i.precio * i.qty, 0);
  const total    = sub - currentDiscount.monto;

  const direccion = selectedEnvio === "correo" ? document.getElementById("inp-calle")?.value.trim() || "" : "";
  const cp        = selectedEnvio === "correo" ? document.getElementById("inp-cp")?.value.trim() || "" : "";
  const localidad = selectedEnvio === "correo" ? document.getElementById("inp-loc")?.value.trim() || "" : "";

  try {
    // 1. Guardar orden en Sheets
    const orderRes = await fetch("/api/orders", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        nombre, apellido, email, telefono: tel,
        items: cart,
        subtotal: sub,
        descuento: currentDiscount.monto,
        codigo: currentDiscount.codigo,
        total,
        pago: selectedPago,
        envio: selectedEnvio,
        direccion, cp, localidad,
      }),
    });

    const orderData = await orderRes.json();
    if (!orderData.orderId) {
      alert("Error guardando la orden: " + (orderData.error || "desconocido"));
      return;
    }

    const orderId = orderData.orderId;

    // 2. Si es Nave, crear intención de pago
    if (selectedPago === "nave") {
      const naveRes = await fetch("/api/nave/create-payment", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          orderId,
          total: Math.round(total),
          nombreCliente: nombre + " " + apellido,
          email,
          telefono: tel,
          items: cart,
        }),
      });

      const naveData = await naveRes.json();
      if (!naveData.success) {
        alert("Error con Nave: " + (naveData.error || "desconocido"));
        return;
      }

      // Guardar datos para después
      sessionStorage.setItem("nord_last_order", JSON.stringify({
        orderId,
        items: cart,
        subtotal: sub,
        descuento: currentDiscount.monto,
        codigo: currentDiscount.codigo,
        total,
        pago: selectedPago,
        envio: selectedEnvio,
      }));

      // Redirigir a Nave
      window.location.href = naveData.checkout_url;
    } else {
      // 3. Si es transferencia, guardar y ir a confirmación
      sessionStorage.setItem("nord_last_order", JSON.stringify({
        orderId,
        items: cart,
        subtotal: sub,
        descuento: currentDiscount.monto,
        codigo: currentDiscount.codigo,
        total,
        pago: selectedPago,
        envio: selectedEnvio,
      }));
      window.location.href = "/confirmacion";
    }
  } catch (err) {
    alert("Error: " + err.message);
  }
}

function updateCta() {
  const cta = document.getElementById("cta-btn");
  if (!cta) return;
  if (selectedPago === "nave") {
    cta.textContent = "🔒 Pagar con Nave";
    cta.className = "btn-nave";
  } else {
    cta.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg> Confirmar pedido por WhatsApp`;
    cta.className = "btn-wp";
  }
}

function render() {
  const cart = getCart();
  const grid = document.getElementById("checkout-grid");

  if (!cart.length) {
    grid.innerHTML = `<div class="cart-empty"><p>Tu carrito está vacío</p><a href="/wellspring" class="btn-outline">Ver catálogo</a></div>`;
    return;
  }

  const sub = cart.reduce((s, i) => s + i.precio * i.qty, 0);
  const totalItems = cart.reduce((s, i) => s + i.qty, 0);

  const itemsHtml = cart.map(i => `
    <div class="cart-item">
      <div class="item-info">
        <p class="item-name">${i.nombre}</p>
        <p class="item-talle">Talle ${i.talle}</p>
      </div>
      <div class="qty-wrap">
        <button class="qty-btn" onclick="changeQty('${i.key}',-1)">−</button>
        <span class="qty-num">${i.qty}</span>
        <button class="qty-btn" onclick="changeQty('${i.key}',1)">+</button>
      </div>
      <div class="item-price">${fmt(i.precio * i.qty)}</div>
      <button class="item-remove" onclick="removeItem('${i.key}')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>`).join("");

  grid.innerHTML = `
    <div class="left">

      <!-- ITEMS -->
      <div class="section-block">
        <p class="section-block-title">Artículos (${totalItems})</p>
        ${itemsHtml}
      </div>

      <!-- DATOS OBLIGATORIOS -->
      <div class="section-block">
        <p class="section-block-title">Tus datos</p>
        <div class="form-row">
          <div class="form-group">
            <label>Nombre<span class="req">*</span></label>
            <input id="inp-nombre" type="text" placeholder="Ej: María" required oninput="this.classList.remove('field-error')">
          </div>
          <div class="form-group">
            <label>Apellido de familia<span class="req">*</span></label>
            <input id="inp-apellido" type="text" placeholder="Ej: García" required oninput="this.classList.remove('field-error')">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Teléfono<span class="req">*</span></label>
            <input id="inp-tel" type="tel" placeholder="11 1234-5678" required oninput="this.classList.remove('field-error')">
          </div>
          <div class="form-group">
            <label>Email<span class="req">*</span></label>
            <input id="inp-email" type="email" placeholder="tu@email.com" required oninput="this.classList.remove('field-error')">
          </div>
        </div>
      </div>

      <!-- ENVÍO -->
      <div class="section-block">
        <p class="section-block-title">Método de envío</p>
        <div class="radio-options">
          <label class="radio-option ${selectedEnvio === 'retiro' ? 'selected' : ''}" data-envio="retiro" onclick="selectEnvio('retiro')">
            <input type="radio" name="envio" ${selectedEnvio === 'retiro' ? 'checked' : ''}>
            <div class="radio-label">
              <div class="radio-title"><span>Retiro en Barrio Habitat</span><span class="badge badge-green">Gratis</span></div>
              <p class="radio-desc">Pilar, Buenos Aires. Coordinamos día y horario por WhatsApp.</p>
            </div>
          </label>
          <label class="radio-option ${selectedEnvio === 'correo' ? 'selected' : ''}" data-envio="correo" onclick="selectEnvio('correo')">
            <input type="radio" name="envio" ${selectedEnvio === 'correo' ? 'checked' : ''}>
            <div class="radio-label">
              <div class="radio-title"><span>Correo Argentino — Domicilio</span><span class="badge badge-orange">A calcular</span></div>
              <p class="radio-desc">Envío a todo el país. El costo se informa por WhatsApp según tu CP.</p>
              <div class="addr-expand ${selectedEnvio === 'correo' ? 'show' : ''}" id="addr-expand">
                <div class="form-row">
                  <div class="form-group"><label>Calle y número</label><input id="inp-calle" type="text" placeholder="Av. Santa Fe 1234"></div>
                  <div class="form-group"><label>Código postal</label><input id="inp-cp" type="text" placeholder="1425" maxlength="8"></div>
                </div>
                <div class="form-row full">
                  <div class="form-group"><label>Ciudad / Localidad</label><input id="inp-loc" type="text" placeholder="Buenos Aires"></div>
                </div>
              </div>
              <div class="correo-info ${selectedEnvio === 'correo' ? 'show' : ''}" id="correo-info">📦 Te informamos el costo exacto por WhatsApp antes de confirmar. El flete se abona por separado.</div>
            </div>
          </label>
        </div>
      </div>

      <!-- CÓDIGO DESCUENTO -->
      <div class="section-block">
        <p class="section-block-title">Código descuento</p>
        <div class="form-row full">
          <div class="form-group">
            <label>¿Tenés un código promocional?</label>
            <input id="inp-codigo" type="text" placeholder="Ingresá tu código aquí" onkeyup="validateCode()" style="text-transform:uppercase">
            <div id="codigo-msg" style="font-size:11px;margin-top:6px"></div>
          </div>
        </div>
      </div>

      <!-- PAGO -->
      <div class="section-block">
        <p class="section-block-title">Método de pago</p>
        <div class="radio-options">

          <label class="radio-option ${selectedPago === 'transferencia' ? 'selected' : ''}" data-pago="transferencia" onclick="selectPago('transferencia')">
            <input type="radio" name="pago" ${selectedPago === 'transferencia' ? 'checked' : ''}>
            <div class="radio-label">
              <div class="radio-title"><span>Transferencia bancaria</span><span class="badge badge-green">Sin comisión</span></div>
              <p class="radio-desc">Transferí al CBU de NORD y avisanos por WhatsApp con el comprobante.</p>
              <div class="pago-detail ${selectedPago === 'transferencia' ? 'show' : ''}" id="pago-transferencia">
                <div class="cbu-block">
                  <div>Titular: <strong>${TITULAR}</strong></div>
                  <div class="cbu-row">CBU: <span class="cbu-val">${CBU}</span>
                    <button class="copy-btn" data-val="${CBU}" onclick="copyText('${CBU}')">Copiar</button>
                  </div>
                  <div class="cbu-row">Alias: <span class="cbu-val">${ALIAS}</span>
                    <button class="copy-btn" data-val="${ALIAS}" onclick="copyText('${ALIAS}')">Copiar</button>
                  </div>
                </div>
              </div>
            </div>
          </label>

          <label class="radio-option ${selectedPago === 'nave' ? 'selected' : ''}" data-pago="nave" onclick="selectPago('nave')">
            <input type="radio" name="pago" ${selectedPago === 'nave' ? 'checked' : ''}>
            <div class="radio-label">
              <div class="radio-title"><span><span class="nave-logo">nave</span> · Tarjetas y billeteras</span><span class="badge badge-orange">+comisión</span></div>
              <p class="radio-desc">Visa, Mastercard, débito, MODO, Naranja X y más.</p>
              <div class="pago-detail ${selectedPago === 'nave' ? 'show' : ''}" id="pago-nave">
                <div class="nave-info">Serás redirigido al checkout seguro de <strong>nave</strong> para completar el pago. Disponible ahora. ✓</div>
              </div>
            </div>
          </label>

        </div>
      </div>

    </div>

    <!-- RESUMEN -->
    <div class="summary-panel">
      <p class="summary-title">Resumen del pedido</p>
      ${cart.map(i => `<div class="sum-row"><span>${i.nombre} x${i.qty}</span><span>${fmt(i.precio*i.qty)}</span></div>`).join("")}
      <div class="sum-row"><span>Envío</span><span id="sum-envio">Gratis</span></div>
      ${currentDiscount.monto > 0 ? `<div class="sum-row"><span>Descuento (${currentDiscount.codigo})</span><span style="color:#2e7d52">-${fmt(currentDiscount.monto)}</span></div>` : ""}
      <div class="sum-row total"><span>Total</span><span>${fmt(sub - currentDiscount.monto)}</span></div>
      <p class="sum-note">* El costo de Correo Argentino no está incluido.</p>

      <button class="btn-wp" id="cta-btn" onclick="submitOrder()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        Confirmar pedido por WhatsApp
      </button>
      <p class="note">Todos los campos con <span style="color:#c0392b">*</span> son obligatorios.</p>
    </div>`;
}

render();
</script>
</body>
</html>
